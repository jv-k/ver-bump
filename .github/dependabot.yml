version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (dependabot bumps the pin and
  # updates the trailing `# vX.Y.Z` comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
