name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

  pull_request:

  workflow_dispatch:

  release:
    types: [published]

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  shellcheck:
    name: Run Shellcheck
    # Lint once on Linux: shellcheck is a static analyser, so running it across
    # three OSes only adds version skew (the Windows choco build lagged and
    # tripped on CRLF). The test suite still runs on the full matrix below.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Test ./ver-bump.sh and ./lib/*.sh
        run: shellcheck -x -e SC1017 ./ver-bump.sh ./lib/*.sh

  tests:
    name: Run test suite on ${{ matrix.os }}
    needs: shellcheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # ver-bump targets Linux + macOS (and WSL/Git-bash). The bats harness
        # can't run natively on Windows: bats-core rejects the drive-letter
        # path (D:/...) as non-absolute in `load`. Windows users run it via WSL.
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git fetch --tags -f

      - name: Update packages
        if: ${{ matrix.os == 'macos-latest' }}
        run: brew update

      - name: Update packages
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: sudo apt-get update -y

      - name: Install Bats and Helpers
        run: |
          chmod +x ./install_bats.sh
          npm run tests:install

      - name: Run Bats test suite
        run: npm run tests:run

  publish-npm:
    name: Publish to NPM registry
    needs: tests
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write   # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history + tags so the prepublish version guard can run
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Verify package.json version matches the release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::release tag ($tag) != package.json version ($pkg)"
            exit 1
          fi

      - name: Pack and smoke-test the tarball
        run: |
          npm pack
          size=$(wc -c < ver-bump-*.tgz)
          echo "tarball bytes: $size"
          test "$size" -lt 524288 || { echo '::error::tarball >512KB — files allowlist regressed'; exit 1; }

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub registry
    needs: tests
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          registry-url: "https://npm.pkg.github.com"
      - name: Scope package name as required by GHPR
        run: npm init -y --scope ${{ github.repository_owner }}
      - run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
