name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

  pull_request:

  workflow_dispatch:

  release:
    types: [published]

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  shellcheck:
    name: Run Shellcheck
    # Lint once on Linux: shellcheck is a static analyser, so running it across
    # three OSes only adds version skew (the Windows choco build lagged and
    # tripped on CRLF). The test suite still runs on the full matrix below.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Test ./ver-bump.sh, ./install.sh and ./lib/*.sh
        run: shellcheck -x -e SC1017 ./ver-bump.sh ./install.sh ./lib/*.sh

  tests:
    name: Run test suite on ${{ matrix.os }}
    needs: shellcheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # ver-bump targets Linux + macOS (and WSL/Git-bash). The bats harness
        # can't run natively on Windows: bats-core rejects the drive-letter
        # path (D:/...) as non-absolute in `load`. Windows users run it via WSL.
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git fetch --tags -f

      - name: Update packages
        if: ${{ matrix.os == 'macos-latest' }}
        run: brew update

      - name: Update packages
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: sudo apt-get update -y

      - name: Install Bats and Helpers
        run: |
          chmod +x ./install_bats.sh
          npm run tests:install

      - name: Run Bats test suite
        run: npm run tests:run

  publish-npm:
    name: Publish to NPM registry
    needs: tests
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write   # OIDC: npm Trusted Publishing (no NPM_TOKEN) + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags so the prepublish version guard can run
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22   # npm OIDC Trusted Publishing requires Node >= 22.14
          registry-url: https://registry.npmjs.org/

      - name: Use an npm with OIDC trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify package.json version matches the release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::release tag ($tag) != package.json version ($pkg)"
            exit 1
          fi

      - name: Pack and smoke-test the tarball
        run: |
          npm pack
          size=$(wc -c < ver-bump-*.tgz)
          echo "tarball bytes: $size"
          test "$size" -lt 524288 || { echo '::error::tarball >512KB — files allowlist regressed'; exit 1; }

      # Tokenless publish via OIDC Trusted Publishing. Requires a one-time setup
      # on npmjs.com: ver-bump > Settings > Trusted Publishers > add this repo's
      # ci.yml workflow. Provenance is generated automatically under OIDC, so no
      # --provenance flag and no NPM_TOKEN are needed.
      - name: Publish via OIDC (prereleases -> 'next', stable -> 'latest')
        run: |
          ver="$(node -p "require('./package.json').version")"
          case "$ver" in
            *-*) tag=next ;;     # SemVer prerelease (e.g. 2.0.0-rc.1) must NOT take 'latest'
            *)   tag=latest ;;
          esac
          echo "publishing $ver to dist-tag: $tag (OIDC trusted publishing, provenance auto)"
          npm publish --access public --tag "$tag"

  publish-github:
    name: Publish to GitHub registry
    needs: tests
    # Stable releases only — prereleases just validate the npmjs provenance path.
    if: github.event.action == 'published' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          registry-url: "https://npm.pkg.github.com"
      - name: Scope package name as required by GHPR
        run: npm init -y --scope ${{ github.repository_owner }}
      - run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release-assets:
    name: Upload release tarball + sha256
    needs: tests
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # gh release upload attaches assets to the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The runtime file set for the curl installer (R-DIST-2, issue #66).
      # package.json rides along because --about / --help read the tool's
      # name + version from it (version_block in lib/ui.sh).
      - name: Build runtime tarball + sha256
        run: |
          tar -czf ver-bump.tar.gz ver-bump.sh lib LICENSE package.json
          sha256sum ver-bump.tar.gz > ver-bump.tar.gz.sha256

      # Unversioned asset names keep install.sh's URLs stable:
      #   latest: releases/latest/download/ver-bump.tar.gz
      #   pinned: releases/download/v<x.y.z>/ver-bump.tar.gz
      # --clobber makes a re-run of this job idempotent.
      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" ver-bump.tar.gz ver-bump.tar.gz.sha256 --clobber

      # Cheap end-to-end proof that the published assets actually install
      # (R-DIST-1/3/5 against the real release). Gates nothing else.
      - name: Smoke-test install.sh against the uploaded assets
        run: |
          export VER_BUMP_INSTALL_VERSION="${GITHUB_REF_NAME#v}"
          export VER_BUMP_PREFIX="$RUNNER_TEMP/smoke-prefix"
          # Assets can take a moment to become downloadable after upload.
          installed=false
          for attempt in 1 2 3; do
            if bash ./install.sh; then
              installed=true
              break
            fi
            echo "install attempt $attempt failed; retrying in 10s"
            sleep 10
          done
          [ "$installed" = true ]
          "$VER_BUMP_PREFIX/bin/ver-bump" --about
