name: Screenshots

# Regenerates the CLI visuals and commits them to main. Everything renders
# via charmbracelet/vhs, which drives a REAL terminal emulator — so the
# inverted-video section pills (VERIFY / RELEASE / …), the dim [dry-run]
# markers, and the soft prompts all render faithfully. (freeze was dropped:
# it flattens inverse-video and ignores SGR-faint, so it could not show the
# restyled output correctly.)
#
# vhs is installed directly as a sha256-pinned release binary (ADR-10 spirit),
# NOT via charmbracelet/vhs-action: the action's Linux installer looks for an
# `ffmpeg-n5.1*` asset in BtbN/FFmpeg-Builds' latest release, which no longer
# exists — it fails with "Failed to install ffmpeg" (still broken on the
# action's master as of 2026-07). It also never checks PATH, so apt-installed
# ffmpeg can't satisfy it. ffmpeg + ttyd come from apt instead.
#
#   img/screenshot.png          — vhs, `verbump --help` (header logo + flags)
#   img/verbump-demo.gif        — vhs, sandbox-driven real bump recording
#   img/verbump-demo-final.png  — the demo's finished DONE frame, as a still
#   img/social-preview.png      — vhs, the 1280x640 social card; the version
#                                 pill comes live from `verbump --help`, so a
#                                 release re-render keeps it current. Also
#                                 synced to packages/docs-site/public/ so the
#                                 user docs site redeploys with the fresh card.
#
# img/demo.gif is NOT rendered here: it is the frozen legacy recording that
# old ver-bump npm READMEs (1.1.8) hotlink via raw main URLs — never touch it.
#
# Triggers: every release tag (v*), plus by hand (workflow_dispatch). The old
# "not on release" rationale cited the ADR-19 develop→main reset, which
# ADR-21 retired — main is the canonical branch now, so rendering from main
# after a tag lands is race-free. The bot commit deliberately has no
# [skip ci]: Vercel honours that marker too, and the docs-site sync must
# trigger a site deploy. Locally: `pnpm screenshots` (or `:help` / `:demo` /
# `:social`) — see dev/screenshots.sh.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  VHS_VERSION: "0.11.0"
  # sha256 of vhs_0.11.0_Linux_x86_64.tar.gz — verified against the release's
  # checksums.txt AND two independent downloads hashed locally.
  VHS_SHA256: "99cb634587eaae0473c1ea377db80c3a048c27f99fe0a7febb1a1e8cb7ee5009"

jobs:
  render:
    name: Render panels + demo via vhs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Install JetBrains Mono, gifsicle, ffmpeg, ttyd, and zsh
        run: |
          # zsh: the tapes `Set Shell "zsh"` and the runner image ships
          # without it — ttyd then fails with "execvp failed: no such file
          # or directory" INSIDE the rendered frames while the run stays
          # green, so the images must be eyeballed after any change here.
          sudo apt-get update -y
          sudo apt-get install -y fonts-jetbrains-mono gifsicle ffmpeg ttyd zsh
          fc-cache -f

      - name: Install vhs (sha256-pinned release binary)
        run: |
          curl -fsSL -o vhs.tar.gz \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          echo "${VHS_SHA256}  vhs.tar.gz" | sha256sum -c -
          tar -xzf vhs.tar.gz --wildcards '*/vhs' --strip-components=1
          sudo install -m 0755 vhs /usr/local/bin/vhs
          rm -f vhs.tar.gz vhs
          vhs --version

      - name: Ensure throwaway gif dir exists
        run: mkdir -p img/tmp

      - name: Render help panel
        run: vhs dev/help.tape

      - name: Render demo gif (also emits img/verbump-demo-final.png)
        run: vhs dev/demo.tape

      - name: Render social-preview card
        run: vhs dev/social.tape

      - name: Optimize verbump-demo.gif (lossless — no colour/quality reduction)
        run: |
          before=$(wc -c < img/verbump-demo.gif)
          gifsicle -O3 img/verbump-demo.gif -o img/verbump-demo.gif
          echo "verbump-demo.gif: ${before} -> $(wc -c < img/verbump-demo.gif) bytes"

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots
          path: |
            img/screenshot.png
            img/verbump-demo.gif
            img/verbump-demo-final.png
            img/social-preview.png
          retention-days: 7
          if-no-files-found: error

  commit:
    name: Commit updated screenshots to main
    needs: [render]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Download rendered artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: screenshots
          path: img

      - name: Sync social card to the user docs site
        run: cp -f img/social-preview.png packages/docs-site/public/social-preview.png

      # No [skip ci] here: Vercel honours the marker, and this commit must
      # deploy the docs site so the synced social card goes live.
      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: main
          file_pattern: img/screenshot.png img/verbump-demo.gif img/verbump-demo-final.png img/social-preview.png packages/docs-site/public/social-preview.png
          commit_message: "docs(img): regenerate release visuals"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
