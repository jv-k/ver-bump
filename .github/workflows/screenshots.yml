name: Screenshots

# Regenerates the CLI visuals and commits them to main. Everything renders
# via charmbracelet/vhs, which drives a REAL terminal emulator — so the
# inverted-video section pills (VERIFY / RELEASE / …), the dim [dry-run]
# markers, and the soft prompts all render faithfully. (freeze was dropped:
# it flattens inverse-video and ignores SGR-faint, so it could not show the
# restyled output correctly.)
#
#   img/screenshot.png   — vhs, `ver-bump --help` (header logo + full flag set)
#   img/demo.gif         — vhs, sandbox-driven real bump recording
#   img/demo-final.png   — the demo's finished DONE frame, as a still
#
# Triggers: run by hand (workflow_dispatch). Intentionally NOT on release —
# the tracked img/* are maintained on develop and reach main via the release
# merge/reset (ADR-19), so auto-rendering on release was redundant and raced
# the reset (it also rendered from main, which lags until then). Locally:
# `pnpm screenshots` (or `:help` / `:demo`) — see dev/screenshots.sh.

on:
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render:
    name: Render panels + demo via vhs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Install JetBrains Mono, gifsicle, and ffmpeg
        run: |
          # Pre-install ffmpeg: charmbracelet/vhs-action's own ffmpeg install
          # is flaky on ubuntu-latest and failed the v2.0.0-rc.1 release run.
          # With it already on PATH the action skips its own (failing) install.
          sudo apt-get update -y
          sudo apt-get install -y fonts-jetbrains-mono gifsicle ffmpeg
          fc-cache -f

      - name: Ensure throwaway gif dir exists
        run: mkdir -p img/tmp

      - name: Render help panel
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2.1.0
        with:
          path: dev/help.tape

      - name: Render demo gif (also emits img/demo-final.png)
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2.1.0
        with:
          path: dev/demo.tape

      - name: Optimize demo.gif (lossless — no colour/quality reduction)
        run: |
          before=$(wc -c < img/demo.gif)
          gifsicle -O3 img/demo.gif -o img/demo.gif
          echo "demo.gif: ${before} -> $(wc -c < img/demo.gif) bytes"

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshots
          path: |
            img/screenshot.png
            img/demo.gif
            img/demo-final.png
          retention-days: 7
          if-no-files-found: error

  commit:
    name: Commit updated screenshots to main
    needs: [render]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Download rendered artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: screenshots
          path: img

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          branch: main
          file_pattern: img/screenshot.png img/demo.gif img/demo-final.png
          commit_message: "docs(img): regenerate screenshots [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
