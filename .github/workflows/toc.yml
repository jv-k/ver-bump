name: TOC Generator

# Regenerate the README table of contents when a README changes on a long-lived
# branch. Pinned to a commit SHA, least-privilege token, narrow path trigger
# (was: `on: push` on every push, no permissions block, floating @v4 tag).

on:
  push:
    branches: [main, develop]
    paths: ['README*.md']
  workflow_dispatch:

concurrency:
  group: toc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generateTOC:
    name: TOC Generator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # scoped to this job; needed to commit the regenerated TOC
    steps:
      - uses: technote-space/toc-generator@9e238e7974de5fcf7b17b7acc54c896160dda0a3 # v4.3.1
        with:
          TARGET_PATHS: 'README*.md'
          TOC_TITLE: 'Details'
          FOLDING: 1
          MAX_HEADER_LEVEL: 3
          GITHUB_TOKEN: ${{ github.token }}
